<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZaiNar World Cup Pool 2026</title>
<style>
  :root{
    --bg:#0b1020; --bg2:#111935; --card:#161f3d; --card2:#1d2a52;
    --line:#27345f; --txt:#e8edff; --muted:#9aa7d0; --dim:#6c7aa8;
    --gold:#ffce4d; --green:#27e08a; --red:#ff5d73; --blue:#5b9dff;
    --accent:#7c5cff;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%, #1b2a5c 0%, transparent 60%),
               radial-gradient(900px 500px at -10% 10%, #2a1b4c 0%, transparent 55%),
               var(--bg);
    color:var(--txt); min-height:100vh;
  }
  header{
    padding:22px 20px 14px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(124,92,255,.10), transparent);
    position:sticky; top:0; z-index:20; backdrop-filter:blur(8px);
    background-color:rgba(11,16,32,.82);
  }
  .wrap{max-width:1040px; margin:0 auto; padding:0 16px}
  h1{margin:0; font-size:22px; letter-spacing:.3px}
  h1 .accent{color:var(--gold)}
  .sub{color:var(--muted); font-size:13px; margin-top:3px}
  .tabs{display:flex; gap:6px; margin-top:14px; flex-wrap:wrap}
  .tab{
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    padding:8px 14px; border-radius:10px; cursor:pointer; font-size:14px; font-weight:600;
    transition:.15s;
  }
  .tab:hover{color:var(--txt); border-color:var(--accent)}
  .tab.active{background:linear-gradient(180deg,var(--accent),#5a3fd6); color:#fff; border-color:transparent}
  main{padding:22px 0 80px}
  .view{display:none}
  .view.active{display:block; animation:fade .25s ease}
  @keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}

  /* Leaderboard */
  .podium{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:18px}
  .pod{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; text-align:center; position:relative; overflow:hidden}
  .pod .rank{font-size:30px; font-weight:800}
  .pod .nm{font-weight:700; margin-top:4px; font-size:15px}
  .pod .pts{font-size:26px; font-weight:800; margin-top:6px}
  .pod.p1{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset, 0 8px 30px rgba(255,206,77,.12)}
  .pod.p1 .rank,.pod.p1 .pts{color:var(--gold)}
  .pod.p2 .rank,.pod.p2 .pts{color:#cdd6ff}
  .pod.p3 .rank,.pod.p3 .pts{color:#e3a06b}
  .pod .medal{font-size:18px}

  table{width:100%; border-collapse:collapse}
  .lb{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .lb th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); padding:10px 14px; background:var(--bg2)}
  .lb td{padding:0; border-top:1px solid var(--line)}
  .row-main{display:grid; grid-template-columns:54px 1fr 90px; align-items:center; padding:12px 14px; cursor:pointer; transition:.12s}
  .row-main:hover{background:var(--card2)}
  .rk{font-weight:800; font-size:17px; color:var(--muted)}
  .rk.t1{color:var(--gold)} .rk.t2{color:#cdd6ff} .rk.t3{color:#e3a06b}
  .pname{font-weight:700}
  .alive{font-size:11px; color:var(--dim); margin-top:2px}
  .alive.some-out{color:var(--gold)}
  .pemail{font-size:11px; color:var(--dim)}
  .ptot{font-weight:800; font-size:19px; text-align:right}
  .tb{font-size:12px; color:var(--muted); text-align:right}
  .tb b{color:var(--txt)}
  .caret{color:var(--dim); transition:.2s; display:inline-block; margin-left:6px}
  .expanded .caret{transform:rotate(90deg)}
  .detail{padding:0 14px 14px 14px; background:var(--bg2)}
  .tb-detail{padding-top:12px; font-size:13px; color:var(--muted)} .tb-detail b{color:var(--txt)}
  .teamgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; padding-top:12px}
  .tcard{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px}
  .tcard .tn{font-weight:700; font-size:13px; display:flex; justify-content:space-between; align-items:center}
  .tcard .tg{font-size:11px; color:var(--dim)}
  .tcard .tp{font-weight:800; color:var(--green)}
  .brk{font-size:11px; color:var(--muted); margin-top:6px; line-height:1.5}
  .brk span{display:inline-block; background:var(--card2); border:1px solid var(--line); border-radius:6px; padding:1px 6px; margin:2px 3px 0 0}
  .pos-1{color:var(--gold)} .pos-2{color:#cdd6ff} .pos-3{color:var(--green)} .pos-4{color:var(--red)}

  /* Standings */
  .grid12{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px}
  .gcard{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .gcard h3{margin:0; padding:10px 14px; font-size:14px; background:var(--bg2); border-bottom:1px solid var(--line); display:flex; justify-content:space-between}
  .gcard h3 .gd{color:var(--dim); font-weight:500; font-size:11px}
  .stbl{width:100%; font-size:13px}
  .stbl th{font-size:10px; color:var(--dim); text-transform:uppercase; padding:6px 4px; text-align:center}
  .stbl th:nth-child(2){text-align:left}
  .stbl td{padding:7px 4px; text-align:center; border-top:1px solid var(--line)}
  .stbl td:nth-child(2){text-align:left; font-weight:600}
  .stbl .qpos{border-left:3px solid transparent}
  .stbl tr.q1 td:first-child{box-shadow:inset 3px 0 var(--gold)}
  .stbl tr.q2 td:first-child{box-shadow:inset 3px 0 #cdd6ff}
  .stbl tr.q3 td:first-child{box-shadow:inset 3px 0 var(--green)}
  .stbl .pt{font-weight:800}
  .owned{color:var(--accent)}
  .owned::after{content:"●"; font-size:8px; vertical-align:middle; margin-left:4px; color:var(--accent)}
  .pill{display:inline-block; font-size:10px; padding:2px 7px; border-radius:20px; background:var(--card2); border:1px solid var(--line); color:var(--muted)}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-top:16px}
  .panel h2{margin:0 0 10px; font-size:16px}
  .third-list{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px}
  .third{display:flex; justify-content:space-between; align-items:center; background:var(--bg2); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13px}
  .third.in{border-color:var(--green)}
  .third.out{opacity:.55}

  /* Results entry */
  .ginput{background:var(--card); border:1px solid var(--line); border-radius:14px; margin-bottom:12px; overflow:hidden}
  .ginput summary{padding:12px 14px; cursor:pointer; font-weight:700; font-size:14px; background:var(--bg2); list-style:none; display:flex; justify-content:space-between; align-items:center}
  .ginput summary::-webkit-details-marker{display:none}
  .ginput summary .st{font-size:11px; color:var(--dim); font-weight:500}
  .matchrow{display:grid; grid-template-columns:1fr 64px 18px 64px 1fr; gap:8px; align-items:center; padding:9px 14px; border-top:1px solid var(--line)}
  .matchrow .tA{text-align:right} .matchrow .tB{text-align:left}
  .matchrow .ko-time{grid-column:1/-1; text-align:center; font-size:11px; color:var(--dim); margin-top:2px}
  .rmatch{display:grid; grid-template-columns:1fr 110px 1fr; gap:10px; align-items:center; padding:10px 14px; border-top:1px solid var(--line)}
  .rmatch .tA{text-align:right} .rmatch .tB{text-align:left}
  .rmatch.done{background:var(--bg2)}
  .rscore{text-align:center; font-weight:800; font-size:17px}
  .rscore .dash{color:var(--dim); margin:0 5px; font-weight:600}
  .rkick{text-align:center; font-size:11px; color:var(--dim)}
  .rcenter{display:flex; flex-direction:column; align-items:center; gap:2px}
  .rtag{font-size:9px; letter-spacing:.04em; text-transform:uppercase; color:var(--dim)}
  .seg{display:inline-flex; background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:3px; gap:3px; margin-bottom:14px}
  .segbtn{background:none; border:0; color:var(--muted); font:inherit; font-size:12px; font-weight:600; padding:6px 13px; border-radius:7px; cursor:pointer; transition:.12s}
  .segbtn:hover:not(.active){color:var(--txt)}
  .segbtn.active{background:linear-gradient(180deg,var(--accent),#5a3fd6); color:#fff}
  .daygroup{background:var(--card); border:1px solid var(--line); border-radius:14px; margin-bottom:12px; overflow:hidden}
  .dayhdr{padding:12px 14px; font-weight:700; font-size:14px; background:var(--bg2); display:flex; justify-content:space-between; align-items:center}
  .dayhdr.d-today{color:var(--accent)}
  .drel{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:2px 9px; border-radius:999px; background:var(--line); color:var(--muted)}
  .drel.d-today{background:var(--accent); color:#fff}
  .drel.d-tom{background:var(--gold); color:#1a1208}
  .matchrow input{width:100%; background:var(--bg); border:1px solid var(--line); color:var(--txt); border-radius:8px; padding:7px; text-align:center; font-size:15px; font-weight:700}
  .matchrow input:focus{outline:none; border-color:var(--accent)}
  .vs{color:var(--dim); text-align:center; font-size:12px}
  .tname{font-weight:600; font-size:14px}
  .tname.owned{color:var(--accent)}

  .ko-add{display:grid; grid-template-columns:120px 1fr 60px 18px 60px 1fr auto; gap:8px; align-items:center}
  select,input.txt{background:var(--bg); border:1px solid var(--line); color:var(--txt); border-radius:8px; padding:8px; font-size:13px}
  select:focus{outline:none; border-color:var(--accent)}
  .btn{background:linear-gradient(180deg,var(--accent),#5a3fd6); color:#fff; border:none; border-radius:9px; padding:9px 16px; font-weight:700; cursor:pointer; font-size:13px}
  .btn:hover{filter:brightness(1.1)}
  .btn.ghost{background:var(--card); border:1px solid var(--line); color:var(--muted)}
  .btn.danger{background:var(--card); border:1px solid var(--red); color:var(--red)}
  .btn.sm{padding:5px 10px; font-size:12px}
  .ko-item{display:grid; grid-template-columns:90px 1fr auto auto; gap:10px; align-items:center; padding:10px 14px; border-top:1px solid var(--line); font-size:14px}
  .ko-item .stg{font-size:11px; color:var(--gold); font-weight:700; text-transform:uppercase}
  .win{color:var(--green); font-weight:700}
  .lose{color:var(--muted)}

  .note{font-size:12px; color:var(--muted); line-height:1.6}
  .rules{font-size:13px; line-height:1.8}
  .rules .pt{color:var(--gold); font-weight:700}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
  .empty{text-align:center; color:var(--dim); padding:40px 10px; font-size:14px}
  .stat-strip{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 16px; flex:1; min-width:140px}
  .stat .v{font-size:24px; font-weight:800}
  .stat .l{font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--green); color:#04240f; padding:10px 18px; border-radius:10px; font-weight:700; opacity:0; transition:.25s; pointer-events:none; z-index:50}
  .toast.show{opacity:1}
  @media(max-width:620px){
    .podium{grid-template-columns:1fr}
    .row-main{grid-template-columns:40px 1fr 70px; }
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>⚽ ZaiNar <span class="accent">World Cup Pool</span> 2026</h1>
    <div class="sub">Draft-six-teams office pool · live leaderboard · 21 players</div>
    <div class="tabs">
      <button class="tab active" data-view="leaderboard">🏆 Leaderboard</button>
      <button class="tab" data-view="standings">📊 Standings</button>
      <button class="tab" data-view="results">⚽ Results</button>
      <button class="tab" data-view="about">📖 Rules &amp; Data</button>
    </div>
  </div>
</header>

<main class="wrap">
  <section id="leaderboard" class="view active"></section>
  <section id="standings" class="view"></section>
  <section id="results" class="view"></section>
  <section id="about" class="view"></section>
</main>

<div class="toast" id="toast"></div>

<script>
/* ============================ DATA ============================ */
// Real 2026 FIFA World Cup group draw (drawn Dec 5, 2025, Washington D.C.)
const GROUPS = {
  A:["Mexico","South Africa","Korea Republic","Czechia"],
  B:["Canada","Bosnia and Herzegovina","Qatar","Switzerland"],
  C:["Brazil","Morocco","Haiti","Scotland"],
  D:["United States","Paraguay","Australia","Turkiye"],
  E:["Germany","Curacao","Ivory Coast","Ecuador"],
  F:["Netherlands","Japan","Sweden","Tunisia"],
  G:["Belgium","Egypt","Iran","New Zealand"],
  H:["Spain","Cape Verde","Saudi Arabia","Uruguay"],
  I:["France","Senegal","Iraq","Norway"],
  J:["Argentina","Algeria","Austria","Jordan"],
  K:["Portugal","DR Congo","Uzbekistan","Colombia"],
  L:["England","Croatia","Ghana","Panama"]

// Normalize pick spellings to canonical group names
const ALIAS = {"USA":"United States","South Korea":"Korea Republic","Türkiye":"Turkiye"};
const canon = t => ALIAS[t] || t;

const TEAM_GROUP = {}; // team -> group letter
Object.entries(GROUPS).forEach(([g,ts])=>ts.forEach(t=>TEAM_GROUP[t]=g));
const ALL_TEAMS = Object.values(GROUPS).flat().sort();

const SCORE = { goal:1, win:3, draw:1, first:8, second:4, bestThird:2,
                ko:{R32:5, R16:8, QF:13, SF:21, Final:34} };
const KO_STAGES = [["R32","Round of 32"],["R16","Round of 16"],["QF","Quarterfinal"],
                   ["SF","Semifinal"],["Final","Final"]];
const KO_LABEL = Object.fromEntries(KO_STAGES);

const PARTICIPANTS = [
 {name:"Jake Levy",picks:["Netherlands","Spain","Morocco","Ecuador","Saudi Arabia","Czechia"],tiebreaker:267},
 {name:"Misha Orduna",picks:["Spain","Germany","Uruguay","Japan","Uzbekistan","Turkiye"],tiebreaker:31},
 {name:"Razvan Lupu",picks:["Spain","Brazil","Austria","Senegal","Norway","Czechia"],tiebreaker:249},
 {name:"Mihai Ferener",picks:["France","Spain","Uruguay","Croatia","Norway","Bosnia and Herzegovina"],tiebreaker:270},
 {name:"Valentin Musoiu",picks:["Spain","France","Colombia","Switzerland","Norway","Bosnia and Herzegovina"],tiebreaker:170},
 {name:"Spiros Kapoulas",picks:["Netherlands","Brazil","Croatia","Senegal","Norway","Bosnia and Herzegovina"],tiebreaker:120},
 {name:"Keith Jolley",picks:["Spain","France","Colombia","Morocco","Norway","Ghana"],tiebreaker:42},
 {name:"Raquel Machado",picks:["Brazil","Spain","Uruguay","Croatia","Norway","Ghana"],tiebreaker:292},
 {name:"Balaji Subramanyam",picks:["Spain","France","Croatia","Uruguay","Saudi Arabia","Ghana"],tiebreaker:157},
 {name:"Alexandru Murgulet",picks:["France","Spain","Croatia","Uruguay","Norway","Ghana"],tiebreaker:283},
 {name:"Krzysztof Makiela",picks:["France","Spain","Japan","Switzerland","Scotland","Sweden"],tiebreaker:79},
 {name:"Fidel Amezcua",picks:["Brazil","Argentina","Croatia","Uruguay","South Africa","Czechia"],tiebreaker:64},
 {name:"Mark Bauer",picks:["Portugal","France","Switzerland","Senegal","Norway","Turkiye"],tiebreaker:320},
 {name:"Christian Urena",picks:["Argentina","Portugal","Colombia","Morocco","Paraguay","Haiti"],tiebreaker:277},
 {name:"Srdjan Miocinovic",picks:["USA","Brazil","Croatia","Switzerland","Paraguay","Bosnia and Herzegovina"],tiebreaker:222},
 {name:"Vinnie Pratap",picks:["France","Spain","Croatia","Uruguay","Norway","Turkiye"],tiebreaker:284},
 {name:"John Springer",picks:["Spain","Argentina","Colombia","Switzerland","Norway","Turkiye"],tiebreaker:291},
 {name:"Austin Rutledge",picks:["Argentina","England","Colombia","Australia","South Africa","New Zealand"],tiebreaker:150},
 {name:"Mirely Perez",picks:["Mexico","Portugal","Croatia","Senegal","Saudi Arabia","Czechia"],tiebreaker:330},
 {name:"Eric Wilson",picks:["Spain","Argentina","Colombia","Morocco","Norway","Turkiye"],tiebreaker:280},
 {name:"Daniel Jacker",picks:["Brazil","France","Colombia","Croatia","Saudi Arabia","Sweden"],tiebreaker:169}
].map((p,i)=>({...p, id:i, picks:p.picks.map(canon)}));

// Which teams are owned by at least one player (for highlighting)
const OWNED = new Set(PARTICIPANTS.flatMap(p=>p.picks));

/* ====================== STATE / PERSISTENCE ====================== */
const LS_KEY = "zainar-wc-2026-v2";

// Real 2026 group-stage fixtures with kickoff (UTC), ordered chronologically per
// group. Cross-checked across ESPN/CBS/Sky/FIFA/Wikipedia. [teamA, teamB, kickoffUTC]
const SCHEDULE = {
 A:[["Mexico","South Africa","2026-06-11T19:00:00Z"],["Korea Republic","Czechia","2026-06-12T02:00:00Z"],["Czechia","South Africa","2026-06-18T16:00:00Z"],["Mexico","Korea Republic","2026-06-19T03:00:00Z"],["Mexico","Czechia","2026-06-25T01:00:00Z"],["Korea Republic","South Africa","2026-06-25T01:00:00Z"]],

 E:[["Germany","Curacao","2026-06-14T17:00:00Z"],["Ivory Coast","Ecuador","2026-06-14T23:00:00Z"],["Germany","Ivory Coast","2026-06-20T20:00:00Z"],["Ecuador","Curacao","2026-06-21T00:00:00Z"],["Curacao","Ivory Coast","2026-06-25T20:00:00Z"],["Ecuador","Germany","2026-06-25T20:00:00Z"]],
 F:[["Netherlands","Japan","2026-06-14T20:00:00Z"],["Sweden","Tunisia","2026-06-15T02:00:00Z"],["Netherlands","Sweden","2026-06-20T17:00:00Z"],["Tunisia","Japan","2026-06-21T04:00:00Z"],["Japan","Sweden","2026-06-25T23:00:00Z"],["Tunisia","Netherlands","2026-06-25T23:00:00Z"]],

 H:[["Spain","Cape Verde","2026-06-15T16:00:00Z"],["Saudi Arabia","Uruguay","2026-06-15T22:00:00Z"],["Spain","Saudi Arabia","2026-06-21T16:00:00Z"],["Uruguay","Cape Verde","2026-06-21T22:00:00Z"],["Cape Verde","Saudi Arabia","2026-06-27T00:00:00Z"],["Uruguay","Spain","2026-06-27T00:00:00Z"]],
 I:[["France","Senegal","2026-06-16T19:00:00Z"],["Iraq","Norway","2026-06-16T22:00:00Z"],["France","Iraq","2026-06-22T21:00:00Z"],["Norway","Senegal","2026-06-23T00:00:00Z"],["Norway","France","2026-06-26T19:00:00Z"],["Senegal","Iraq","2026-06-26T19:00:00Z"]],
 J:[["Argentina","Algeria","2026-06-17T01:00:00Z"],["Austria","Jordan","2026-06-17T04:00:00Z"],["Argentina","Austria","2026-06-22T17:00:00Z"],["Jordan","Algeria","2026-06-23T03:00:00Z"],["Algeria","Austria","2026-06-28T02:00:00Z"],["Jordan","Argentina","2026-06-28T02:00:00Z"]],
 K:[["Portugal","DR Congo","2026-06-17T17:00:00Z"],["Uzbekistan","Colombia","2026-06-18T02:00:00Z"],["Portugal","Uzbekistan","2026-06-23T17:00:00Z"],["Colombia","DR Congo","2026-06-24T02:00:00Z"],["Colombia","Portugal","2026-06-27T23:30:00Z"],["DR Congo","Uzbekistan","2026-06-27T23:30:00Z"]],
 L:[["England","Croatia","2026-06-17T20:00:00Z"],["Ghana","Panama","2026-06-17T23:00:00Z"],["England","Ghana","2026-06-23T20:00:00Z"],["Panama","Croatia","2026-06-23T23:00:00Z"],["Panama","England","2026-06-27T21:00:00Z"],["Croatia","Ghana","2026-06-27T21:00:00Z"]]
};

function defaultState(){
  const groups = {};
  for(const g of Object.keys(SCHEDULE)){
    groups[g] = SCHEDULE[g].map(([a,b,kickoff])=>({a, b, kickoff, sa:"", sb:""}));
  }
  return { groups, ko:[] };

function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    if(!s.groups || !s.ko) return defaultState();
    return s;
  }catch(e){ return defaultState(); }
}

const num = v => (v===""||v===null||v===undefined||isNaN(+v)) ? null : Math.max(0,Math.floor(+v));
const played = m => num(m.sa)!==null && num(m.sb)!==null;

// Is a team's finishing position mathematically locked before the group is done?
// Brute-forces every remaining W/D/L outcome; returns the locked position (1..4)
// only when the rank is unambiguous in EVERY scenario (no points tie at the
// boundary, where goal-difference could still reorder things). Else null.
function lockedPos(g, team, basePts){
  const rem = state.groups[g].filter(m=>!played(m));
  if(rem.length===0) return null;            // completed groups use real standings
  const teams = GROUPS[g], k = rem.length;
  let pos=null;
  for(let mask=0; mask<3**k; mask++){
    const pts={...basePts}; let mm=mask;
    for(let i=0;i<k;i++){
      const o=mm%3; mm=(mm-o)/3; const m=rem[i];
      if(o===0) pts[m.a]+=SCORE.win;
      else if(o===1) pts[m.b]+=SCORE.win;
      else { pts[m.a]+=SCORE.draw; pts[m.b]+=SCORE.draw; }
    }
    const me=pts[team]; let greater=0, equal=0;
    teams.forEach(t=>{ if(t===team) return; if(pts[t]>me) greater++; else if(pts[t]===me) equal++; });
    if(equal>0) return null;                 // tie on points -> GD could decide -> not locked
    if(pos===null) pos=greater+1; else if(pos!==greater+1) return null;
  }
  return pos;
}

/* ========================== SCORING ENGINE ========================== */
function compute(){
  // team -> accumulator
  const T = {};
  ALL_TEAMS.forEach(t=>T[t]={team:t, group:TEAM_GROUP[t], goals:0, gf:0, ga:0,
    w:0,d:0,l:0, played:0, matchPts:0, place:0, placeLabel:"", placePts:0,
    thirdAdv:false, bestThird:false, locked:false, ko:[], koPts:0, total:0});

  let totalGoals = 0;

  // ---- Group stage ----
  for(const [g,matches] of Object.entries(state.groups)){
    matches.forEach(m=>{
      if(!played(m)) return;
      const sa=num(m.sa), sb=num(m.sb);
      const A=T[m.a], B=T[m.b];
      A.goals+=sa; B.goals+=sb; A.gf+=sa; A.ga+=sb; B.gf+=sb; B.ga+=sa;
      A.played++; B.played++; totalGoals+=sa+sb;
      if(sa>sb){A.w++;B.l++;A.matchPts+=SCORE.win;}
      else if(sb>sa){B.w++;A.l++;B.matchPts+=SCORE.win;}
      else {A.d++;B.d++;A.matchPts+=SCORE.draw;B.matchPts+=SCORE.draw;}
    });
  }
  ALL_TEAMS.forEach(t=>{ T[t].goals += 0; }); // goal points applied in total

  // ---- Group standings + placement ----
  // Placement points are awarded only once a group is complete (all 6 matches
  // entered); standings still show provisionally so the board feels live.
  const complete={}; Object.keys(GROUPS).forEach(g=>complete[g]=state.groups[g].every(played));
  const allComplete = Object.values(complete).every(Boolean);
  const standings = {}; // g -> ordered array of team objects
  const thirds = [];
  for(const g of Object.keys(GROUPS)){
    const arr = GROUPS[g].map(t=>T[t]);
    arr.sort(cmpTeam);
    standings[g]=arr;
    const basePts={}; GROUPS[g].forEach(t=>basePts[t]=T[t].matchPts);
    arr.forEach((t,i)=>{
      t.place=i+1;
      t.placeLabel=["1st","2nd","3rd","4th"][i];
      // Award 1st/2nd when the group is complete OR the position is locked early.
      const pos = complete[g] ? i+1 : lockedPos(g, t.team, basePts);
      if(pos===1){ t.placePts=SCORE.first; t.locked=!complete[g]; }
      else if(pos===2){ t.placePts=SCORE.second; t.locked=!complete[g]; }
    });
    thirds.push(arr[2]);
  }
  // ---- Best third-placed: top 8 of 12 advance (awarded only when all groups done) ----
  const thirdsRanked = thirds.slice().sort(cmpTeam);
  thirdsRanked.forEach((t,i)=>{
    t.thirdAdv = i<8;                                  // provisional, for display
    if(allComplete && i<8){ t.bestThird=true; t.placePts+=SCORE.bestThird; }
  });

  // ---- Knockout ----
  state.ko.forEach(m=>{
    const sa=num(m.sa), sb=num(m.sb);
    if(sa===null||sb===null) return;
    if(!T[m.a]||!T[m.b]) return;
    T[m.a].goals+=sa; T[m.b].goals+=sb; totalGoals+=sa+sb;
    let winner=null;
    if(sa>sb) winner=m.a; else if(sb>sa) winner=m.b; else winner=m.winner||null;
    const stagePts = SCORE.ko[m.stage]||0;
    [[m.a,sa,sb],[m.b,sb,sa]].forEach(([team,gf,ga])=>{
      const won = team===winner;
      T[team].ko.push({stage:m.stage, opp: team===m.a?m.b:m.a, gf, ga, won, pts: won?stagePts:0});
      if(won) T[team].koPts+=stagePts;
    });
  });

  // ---- Totals ----
  ALL_TEAMS.forEach(t=>{
    const o=T[t];
    o.total = o.goals*SCORE.goal + o.matchPts + o.placePts + o.koPts;
  });

  // ---- Alive / eliminated ----
  // A team is out once the group stage is complete and it did not advance, or
  // once it loses a knockout match. Before the group stage finishes no team is
  // treated as eliminated on group grounds.
  const koLosers = new Set();
  state.ko.forEach(m=>{
    const sa=num(m.sa), sb=num(m.sb);
    if(sa===null||sb===null) return;
    const winner = sa>sb?m.a:sb>sa?m.b:(m.winner||null);
    if(!winner) return;                  // level with no recorded winner: undetermined
    koLosers.add(winner===m.a?m.b:m.a);
  });
  ALL_TEAMS.forEach(t=>{
    const o=T[t];
    const advancing = o.place<=2 || o.bestThird;
    o.eliminated = koLosers.has(t) || (allComplete && !advancing);
    o.alive = !o.eliminated;
  });

  // ---- Participants ----
  const board = PARTICIPANTS.map(p=>{
    const teams = p.picks.map(t=>T[t]);
    const total = teams.reduce((s,t)=>s+t.total,0);
    const aliveCount = teams.filter(t=>t.alive).length;
    return {...p, teams, total, aliveCount, tbDiff: Math.abs(p.tiebreaker-totalGoals)};
  });
  board.sort((a,b)=> b.total-a.total || a.tbDiff-b.tbDiff || a.name.localeCompare(b.name));
  let lastTot=null,lastRank=0;
  board.forEach((p,i)=>{ if(p.total!==lastTot){lastRank=i+1;lastTot=p.total;} p.rank=lastRank; });

  return {T, standings, thirdsRanked, totalGoals, board, allComplete};
}
// FIFA-style: pts, GD, GF (simplified)
function cmpTeam(a,b){
  return b.matchPts-a.matchPts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf || a.team.localeCompare(b.team);
}

function teamBreakdown(t){
  const b=[];
  if(t.goals) b.push(`${t.goals}⚽ = ${t.goals}`);
  if(t.matchPts) b.push(`${t.w}W ${t.d}D = ${t.matchPts}`);
  if(t.place===1&&t.placePts) b.push(`<span class="pos-1">1st = 8</span>`);
  else if(t.place===2&&t.placePts) b.push(`<span class="pos-2">2nd = 4</span>`);
  else if(t.bestThird) b.push(`<span class="pos-3">3rd adv = 2</span>`);
  t.ko.filter(k=>k.won).forEach(k=>b.push(`<span class="pos-1">${k.stage} W = ${k.pts}</span>`));
  return b.length? b.map(x=>`<span>${x}</span>`).join("") : `<span style="opacity:.5">no points yet</span>`;
}

function renderKoBracket(d){
  if(!state.ko.length) return `<div class="panel"><h2>Knockout Bracket</h2><div class="note">Knockout matchups appear here automatically once the group stage ends and the bracket is set.</div></div>`;
  const byStage = KO_STAGES.map(([s,label])=>{
    const ms = state.ko.filter(m=>m.stage===s);
    if(!ms.length) return "";
    const items = ms.map(m=>{
      const sa=num(m.sa),sb=num(m.sb), done=sa!==null&&sb!==null;
      let w=null; if(done){ w = sa>sb?m.a:sb>sa?m.b:(m.winner||null); }
      const side=(team,sc)=>`<span class="${w===team?'win':done?'lose':''} ${ownClass(team)}">${team}${done?` ${sc}`:''}</span>`;
      return `<div class="ko-item"><span class="stg">${label}</span>
        <span>${side(m.a,sa)} <span style="color:var(--dim)">v</span> ${side(m.b,sb)}${done&&sa===sb?' <span class="gd">(pens)</span>':''}</span>
        <span>${w?`<span class="win">${w} +${SCORE.ko[s]}</span>`:'<span class="gd">pending</span>'}</span><span></span></div>`;
    }).join("");
    return `<div class="gcard" style="margin-top:10px"><h3>${label} <span class="gd">win = ${SCORE.ko[s]} pts</span></h3>${items}</div>`;
  }).join("");
  return `<div class="panel"><h2>Knockout Bracket</h2>${byStage}</div>`;
}

function matchCenter(m, pendingText){
  const sa=num(m.sa), sb=num(m.sb), done=played(m);
  return done
    ? `<span class="rscore">${sa}<span class="dash">–</span>${sb}</span>`
    : `<span class="rkick">${pendingText}</span>`;
}

function resultsByGroup(){
  const groupForms = Object.keys(GROUPS).map(g=>{
    const ms = state.groups[g];
    const playedN = ms.filter(played).length;
    const rows = ms.map(m=>`<div class="rmatch ${played(m)?'done':''}">
        <div class="tname tA ${ownClass(m.a)}">${m.a}</div>
        ${matchCenter(m, fmtKick(m.kickoff))}
        <div class="tname tB ${ownClass(m.b)}">${m.b}</div>
      </div>`).join("");
    return `<details class="ginput" ${playedN>0?'open':''}><summary>Group ${g} <span class="st">${playedN}/6 played</span></summary>${rows}</details>`;
  }).join("");

  const koList = state.ko.map(m=>{
    const sa=num(m.sa),sb=num(m.sb),done=sa!==null&&sb!==null,tie=done&&sa===sb;
    const winner = done ? (sa>sb?m.a:sb>sa?m.b:m.winner) : null;
    return `<div class="ko-item">
      <span class="stg">${KO_LABEL[m.stage]||m.stage}</span>
      <span><span class="${ownClass(m.a)}">${m.a}</span> ${done?`<b>${sa}–${sb}</b>`:'vs'} <span class="${ownClass(m.b)}">${m.b}</span>${tie&&m.winner?` <span class="note">(${m.winner} on pens)</span>`:''}</span>
      <span class="gd">${done?(winner||'—'):'pending'}</span>
    </div>`;
  }).join("");

  return `<h2 style="font-size:16px;margin:6px 0">Group Stage</h2>
    ${groupForms}
    ${state.ko.length?`<div class="panel"><h2>Knockout Stage</h2><div style="margin-top:8px">${koList}</div></div>`:''}`;
}

function resultsByDate(){
  const dated = [], undated = [];
  for(const [g,ms] of Object.entries(state.groups))
    ms.forEach(m=>dated.push({...m, tag:"Group "+g}));
  state.ko.forEach(m=>{
    const item = {...m, tag:KO_LABEL[m.stage]||m.stage};
    (m.kickoff?dated:undated).push(item);
  });
  dated.sort((a,b)=> new Date(a.kickoff)-new Date(b.kickoff));

  const days=[], byKey={};
  dated.forEach(m=>{
    const info=dayInfo(m.kickoff);
    if(!byKey[info.key]){ byKey[info.key]={info, ms:[]}; days.push(byKey[info.key]); }
    byKey[info.key].ms.push(m);
  });

  const dayBlock = ({info, ms}) => {
    const relCls = info.rel==="Today"?"d-today":info.rel==="Tomorrow"?"d-tom":"";
    const rel = info.rel?`<span class="drel ${relCls}">${info.rel}</span>`:`<span class="st">${ms.length} game${ms.length>1?'s':''}</span>`;
    const rows = ms.map(m=>dateRow(m, fmtTime(m.kickoff))).join("");
    return `<div class="daygroup"><div class="dayhdr ${info.rel==='Today'?'d-today':''}">${info.label}${rel}</div>${rows}</div>`;
  };

  const dayHtml = days.map(dayBlock).join("");
  const koHtml = undated.length
    ? `<div class="daygroup"><div class="dayhdr">Knockout stage <span class="st">date TBD</span></div>${undated.map(m=>dateRow(m,"TBD")).join("")}</div>`
    : "";
  return dayHtml + koHtml || `<div class="empty">No fixtures to show.</div>`;
}

function dateRow(m, pendingText){
  const center = `<span class="rcenter">${matchCenter(m, pendingText)}<span class="rtag">${m.tag}</span></span>`;
  return `<div class="rmatch ${played(m)?'done':''}">
    <div class="tname tA ${ownClass(m.a)}">${m.a}</div>
    ${center}
    <div class="tname tB ${ownClass(m.b)}">${m.b}</div>
  </div>`;
}

window.exportData=()=>{
  const out={...state, updated:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="results.json"; a.click(); URL.revokeObjectURL(url);

};
window.importData=el=>{
  const f=el.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const s=JSON.parse(r.result);
    if(!s.groups||!s.ko) throw 0; state=s; save(); render(); toast("Imported ✓");
  }catch(e){ toast("Invalid file"); } };
  r.readAsText(f);
};
window.resetData=()=>{ if(confirm("Clear all entered results? This cannot be undone.")){ state=defaultState(); save(); render(); toast("Reset"); } };

function matchesPlayed(){
  return Object.values(state.groups).flat().filter(played).length
    + state.ko.filter(m=>num(m.sa)!==null&&num(m.sb)!==null).length;
}
function matchesTotal(){
  return Object.values(state.groups).flat().length + state.ko.length;
}

function fmtUpdated(){
  if(!lastUpdated) return "—";
  const d=new Date(lastUpdated); if(isNaN(d)) return lastUpdated;
  return d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
}
function fmtKick(iso){
  if(!iso) return "";
  const d=new Date(iso); if(isNaN(d)) return "";
  return d.toLocaleString(undefined,{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
}
function fmtTime(iso){
  if(!iso) return "";
  const d=new Date(iso); if(isNaN(d)) return "";
  return d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
}
// Day bucket + relative label (Today/Tomorrow/Yesterday) in the viewer's local time.
function dayInfo(iso){
  const d=new Date(iso);
  const startOf = x => new Date(x.getFullYear(),x.getMonth(),x.getDate());
  const day = startOf(d);
  const diff = Math.round((day - startOf(new Date()))/86400000);
  const rel = diff===0?"Today":diff===1?"Tomorrow":diff===-1?"Yesterday":"";
  const label = d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
  return {key:day.getTime(), label, rel};
}
async function fetchResults(){
  const r = await fetch(RESULTS_URL + "?t=" + Date.now(), {cache:"no-store"});
  if(!r.ok) throw new Error("no results.json");
  const j = await r.json();
  if(!j || !j.groups || !j.ko) throw new Error("bad shape");
  return j;
}
async function boot(){
  try{
    const j = await fetchResults();
    state = j; lastUpdated = j.updated || null; dataSource = "live";
  }catch(e){ /* fall back to localStorage/default already in `state` */ }
  render();
  setInterval(poll, 180000); // refresh every 3 min to pick up agent updates
}
async function poll(){
  if(dataSource!=="live") return;
  try{
    const j = await fetchResults();
    if(j.updated && j.updated !== lastUpdated){
      state = j; lastUpdated = j.updated; render(); toast("Results updated ✓");
    }
  }catch(e){}
}

/* ============================ TABS ============================ */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    tab.classList.add("active");
    $("#"+tab.dataset.view).classList.add("active");
  });
});

boot();
