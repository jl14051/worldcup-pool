name: Fetch World Cup results

on:
  # Scheduled sync is disabled: the tournament is over, so there is nothing left
  # to fetch. To bring it back for a future tournament, uncomment the schedule
  # block below. The manual "Run workflow" button still works either way.
  # schedule:
  #   - cron: "17,47 * * * *"
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write
  issues: write

concurrency:
  group: fetch-results
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync results from feed
        id: sync
        run: python scripts/fetch_results.py

      - name: Commit if changed
        # always() so the files written before the post-write shootout alert
        # (which exits non-zero) still commit. scores_changed is set before that
        # fail, so the commit-message logic below still has it.
        if: always()
        run: |
          git add results.json checked.json
          if git diff --cached --quiet; then
            echo "No file change."
          else
            git config user.name "wc-pool-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if [[ "${{ steps.sync.outputs.scores_changed }}" == "true" ]]; then
              git commit -m "Update results from feed"
            else
              git commit -m "Heartbeat: record last check time"
            fi
            git push
          fi

      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled result fetch failed at ${new Date().toISOString()}.`,
              ``,
              `Run logs: ${runUrl}`,
              ``,
              `Bring this back to Claude to diagnose and fix.`,
            ].join("\n");
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "fetch-failure",
            });
            if (open.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: "⚠️ Result fetch failed", body, labels: ["fetch-failure"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body,
              });
            }
